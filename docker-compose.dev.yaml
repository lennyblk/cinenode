services:
  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cinenode
      MYSQL_USER: cinenode
      MYSQL_PASSWORD: cinenode
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    ports:
      - '8080:80'
    depends_on:
      - mysql
    environment:
      - PMA_HOST=mysql

volumes:
  mysql_data:
    driver: local
